name: "S3 Backup"
description: "Comprehensive S3 backup solution with modern web interface for managing Home Assistant backups"
url: "https://github.com/geraldhansen/homeassistant-addons/tree/main/s3-backup"
version: "0.0.8"
slug: "s3-backup"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

hassio_api: true
hassio_role: admin
auth_api: false

ingress: true
ingress_port: 8099
panel_icon: mdi:pail
panel_title: S3 Backup

map:
  - backup:rw

options:
  s3_endpoint: ""
  s3_bucket: ""
  s3_region: "us-east-1"
  s3_access_key: ""
  s3_secret_key: ""
  s3_prefix: "ha-backups/"
  days_between_backups: 3
  max_backups_in_ha: 4
  max_backups_in_s3: 4
  delete_after_upload: false

schema:
  s3_endpoint: str
  s3_bucket: str
  s3_region: str
  s3_access_key: str
  s3_secret_key: str
  s3_prefix: str
  days_between_backups: int
  max_backups_in_ha: int
  max_backups_in_s3: int
  delete_after_upload: bool
